<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Stock Manager Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f7;margin:0;padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:10px}
.card{padding:15px;border:1px solid #ddd;margin-bottom:15px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px;border:none;border-radius:6px;cursor:pointer}
.btn{background:#2980b9;color:white}
.btn-danger{background:#e74c3c;color:white}
.btn-success{background:#27ae60;color:white}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center}
th{background:#2c3e50;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none">

<h2>📦 Stock Manager Pro</h2>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>➕ Nouvelle Vente</h3>

    <select id="productSelect"></select>
    <input id="price" placeholder="Prix vente">
    <input id="qty" placeholder="Quantité">

    <button class="btn-success" onclick="addSale()">Ajouter</button>
</div>

<div class="card">
    <button class="btn" onclick="exportExcel()">Excel</button>
    <button class="btn" onclick="exportPDF()">PDF</button>
</div>

<div class="card">
    <h3>📦 Stock</h3>
    <table id="stockTable"></table>
</div>

<div class="card">
    <h3>📊 Sales</h3>
    <table id="salesTable"></table>
</div>

</div>

<script>

// 🔥 Firebase config (tuu)
const firebaseConfig = {
    apiKey: "AIzaSyAn3cl74J4CY7Qzb8tF_KlercWOs0BGSBc",
    authDomain: "stock-166df.firebaseapp.com",
    databaseURL: "https://stock-166df-default-rtdb.firebaseio.com",
    projectId: "stock-166df",
    storageBucket: "stock-166df.appspot.com",
    messagingSenderId: "1071318301341",
    appId: "1:1071318301341:web:e1a512beec2a20cf3274"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let products = [];
let sales = [];
let chart;

// 👤 LOGIN
function login(){
    auth.signInWithEmailAndPassword(
        email.value,
        password.value
    ).then(()=>{
        loginBox.style.display="none";
        app.style.display="block";
        init();
    }).catch(e=>alert(e.message));
}

// 📦 INIT DATA
function init(){

db.ref("products").on("value",s=>{
    products = s.val() || [];
    render();
});

db.ref("sales").on("value",s=>{
    let data = s.val() || {};
    sales = Object.keys(data).map(k=>({...data[k],key:k}));
    render();
});

}

// ➕ ADD SALE
function addSale(){

let id = productSelect.value;
let p = products.find(x=>x.id==id);
let q = Number(qty.value);
let price = Number(price.value);

if(!p || q>p.qty) return alert("Stock insuffisant");

p.qty -= q;

let sale = {
    date:new Date().toISOString().split("T")[0],
    productName:p.name,
    qty:q,
    ca:price*q,
    profit:(price-p.pu)*q
};

db.ref("products").set(products);
db.ref("sales").push(sale);

}

// 📊 RENDER
function render(){

// STOCK
let t = "<tr><th>Produit</th><th>Stock</th></tr>";
products.forEach(p=>{
    t += `<tr><td>${p.name}</td><td>${p.qty}</td></tr>`;
    if(p.qty<=5) console.log("⚠ Stock faible",p.name);
});
stockTable.innerHTML = t;

// SALES
let s = "<tr><th>Date</th><th>Produit</th><th>Q</th><th>CA</th><th>Profit</th></tr>";
sales.forEach(x=>{
    s += `<tr>
    <td>${x.date}</td>
    <td>${x.productName}</td>
    <td>${x.qty}</td>
    <td>${x.ca}</td>
    <td>${x.profit}</td>
    </tr>`;
});
salesTable.innerHTML = s;

// SELECT
productSelect.innerHTML = products.map(p=>
`<option value="${p.id}">${p.name}</option>`
);

// CHART
let ctx = document.getElementById("chart");

if(chart) chart.destroy();

chart = new Chart(ctx,{
    type:"line",
    data:{
        labels:sales.map(s=>s.date),
        datasets:[{
            label:"Profit",
            data:sales.map(s=>s.profit)
        }]
    }
});

}

// 📁 EXPORT EXCEL
function exportExcel(){
let wb = XLSX.utils.book_new();
let ws = XLSX.utils.json_to_sheet(sales);
XLSX.utils.book_append_sheet(wb,ws,"Sales");
XLSX.writeFile(wb,"sales.xlsx");
}

// 📄 EXPORT PDF
function exportPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();
doc.text("Sales Report",10,10);

let y=20;
sales.forEach(s=>{
    doc.text(`${s.date} ${s.productName} ${s.profit}`,10,y);
    y+=10;
});

doc.save("report.pdf");
}

</script>

</body>
</html>
